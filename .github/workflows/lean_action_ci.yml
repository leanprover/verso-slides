name: Lean Action CI

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true
                  cache-dependency-glob: "browser-tests/pyproject.toml"

            - name: Cache Playwright browsers
              uses: actions/cache@v5
              with:
                  path: .playwright-browsers
                  key: playwright-${{ runner.os }}-${{ hashFiles('browser-tests/uv.lock') }}

            - uses: leanprover/lean-action@v1

    typecheck:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Install TypeScript
              run: |
                  sudo apt-get update && sudo apt-get install -y node-typescript

            - name: Type check panel JavaScript
              run: |
                  cd panel
                  tsc --noEmit -p jsconfig.json
